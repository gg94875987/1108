        const apiKey = "";

        async function fetchGeminiWithRetry(prompt, systemInstruction, schema = null, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            if (schema) {
                payload.generationConfig = {
                    responseMimeType: "application/json",
                    responseSchema: schema
                };
            }

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return fetchGeminiWithRetry(prompt, systemInstruction, schema, retries - 1, delay * 2);
                }
                throw error;
            }
        }

                    orderId: "ZN-" + Date.now().toString().slice(-6) + "-" + Math.floor(Math.random() * 900 + 100),
                    date: new Date().toLocaleDateString(),
                    items: [...cart],
                    total: finalTotal,
                    info: { ...checkoutForm }
                };

                setOrders(prev => [newOrder, ...prev]);

                if (currentUser.isLoggedIn) {
                    const earnedPoints = Math.floor(finalTotal / 100); 
                    const newSpent = currentUser.accSpent + finalTotal;
                    
                    let newLevel = "新晉藏友";
                    if (newSpent >= 80000) newLevel = "窯火尊榮";
                    else if (newSpent >= 30000) newLevel = "典藏雅士";

                    let updatedCoupons = [...currentUser.coupons];
                    if (activeCoupon) {
                        updatedCoupons = updatedCoupons.filter(c => c !== activeCoupon.code);
                    }

                    setCurrentUser(prev => ({
                        ...prev,
                        accSpent: newSpent,
                        points: prev.points + earnedPoints,
                        level: newLevel,
                        coupons: updatedCoupons
                    }));

                    alert(`結帳成功！\n本筆交易成功為您累積了 ${earnedPoints} 點典藏積分！\n您目前的累計典藏金額達到 NT$ ${newSpent.toLocaleString()} 元，會籍晉升/維持為：【${newLevel}】。`);
                }

                setCart([]);
                setActiveCoupon(null);
                setIsCheckoutOpen(false);
                setCurrentView('orders');
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!userInput.trim()) return;

                const userMsg = userInput;
                setChatMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                setUserInput('');
                setIsChatLoading(true);

                const chatbotSchema = {
                    type: "OBJECT",
                    properties: {
                        replyText: { type: "STRING" },
                        recommendedProductId: { type: "STRING" }
                    },
                    required: ["replyText", "recommendedProductId"]
                };

                const systemInstruction = `你是一位精通台灣無形文化資產的『竹南交趾陶藝術策展人』。請用優雅、內斂、溫潤的文人藝術語句回答關於空間風水、開業與新婚送禮、收藏投資或工藝保養之問題。
                這裡有我們展廊的 15 款大師作品庫，格式為 JSON 陣列：${JSON.stringify(PRODUCT_DATABASE)}。
                請分析使用者問題中的情感脈絡與核心需求（如：玄關辟邪、新居落成、商業招財、預算考量），並從中挑選最適合的一款交趾陶作品。
                請以 JSON 格式回傳：
                - replyText: 充滿文化涵義、細緻優雅的答覆。
                - recommendedProductId: 推薦作品的 id（必須嚴格對應資料庫中的 id 值，如 myth-01, fengshui-02 等）。若無適合推薦則回傳空字串。`;

                try {
                    const result = await fetchGeminiWithRetry(userMsg, systemInstruction, chatbotSchema);
                    const responseJson = JSON.parse(result.candidates[0].content.parts[0].text);
                    
                    const matchedProduct = PRODUCT_DATABASE.find(p => p.id === responseJson.recommendedProductId) || null;

                    setChatMessages(prev => [...prev, {
                        sender: 'curator',
                        text: responseJson.replyText,
                        linkProduct: matchedProduct
                    }]);
                } catch (error) {
                    setChatMessages(prev => [...prev, {
                        sender: 'curator',
                        text: "✨ 靈感阻斷：無法連線至大師藝廊的智慧神經網路，這或許是高溫窯爐的磁場干擾，請您稍後再試。",
                        linkProduct: null
                    }]);
                } finally {
                    setIsChatLoading(false);
                }
            };

            const generateInscription = async () => {
                if (!inscriptionInput.target.trim()) {
                    alert("請先輸入您客製化題贈的對象、名字或祝賀場合。");
                    return;
                }

                setIsGeneratingInscription(true);
                setGeneratedInscription(null);

                const inscriptionSchema = {
                    type: "OBJECT",
                    properties: {
                        inscription: { type: "STRING" },
                        explanation: { type: "STRING" }
                    },
                    required: ["inscription", "explanation"]
                };

                const systemInstruction = `你是一位精通古典漢語、易經與陶藝落款美學的國寶級題字書法大師。
                使用者即將為這件交趾陶作品進行『落款底座客製化題字題詩』：

                - explanation: 簡短優雅地向用戶解釋此款識的文學意境與美好寓意。`;

                try {
                    const result = await fetchGeminiWithRetry(
                        `請為作品：${selectedProduct?.name}，題贈對象：${inscriptionInput.target} 生成款識。`,
                        systemInstruction,
                        inscriptionSchema
                    );
                    const responseJson = JSON.parse(result.candidates[0].content.parts[0].text);
                    setGeneratedInscription(responseJson);
                } catch (error) {

            const navigateToDetail = (id) => {

                                        <div className="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>

                                                            <span className="text-[10px] text-neutral-400 bg-neutral-100 px-1.5 py-0.5">{product.category}</span><img src="https://www.skiln.com.tw/images/common/about/pic6.jpg" class="w-full h-full object-cover">

                        {currentView === 'story' && (

                                    <span className="text-xs tracking-widest text-amber-900 font-bold uppercase">竹南交趾陶・傳承故事</span>

                                    <p className="text-xs text-neutral-500 max-w-lg mx-auto leading-relaxed">
                                        交趾陶早期源自華南，隨閩粵移民於清代傳入台灣，因其華麗剔透被廣泛運用於寺廟剪黏、脊頂與壁堵。竹南老窯堅持手捏、配釉與雙重鍛燒，將這座原本遙不可及的屋脊神話，變為融入生活的殿堂藏品。
                                    </p>
                                </div>

                                <div className="grid md:grid-cols-2 gap-8 items-center bg-[#F4EFE8] p-6 rounded-sm border border-neutral-200">
                                    <div className="space-y-4">
                                        <h3 className="text-lg font-medium text-amber-950">【匠心雕琢，竹南交趾的文化溫度】</h3>
                                        <p className="text-xs text-neutral-600 leading-relaxed text-justify font-light">
                                           源自竹南的交趾陶，不僅是色彩斑斕的藝術，更是客家匠心與歲月的凝鍊。我們秉持「傳承文化、創新生活」的核心，將傳統精湛工藝，轉化為具備現代美學的藝術禮贈。透過 AI 智能顧問，我們精準連結您的情感需求，讓每一件精雕細琢的交趾陶藝，在指尖傳遞出客家山林間最溫潤的祝福，為您的珍貴心意，刻下永恆的文化印記。
                                        </p>
                                    </div>
                                    <div className="h-[200px] overflow-hidden">
                                        <img src="https://www.skiln.com.tw/images/common/about/pic6.jpg" className="w-full h-full object-cover" />
                                    </div>

                                <div className="space-y-6">

                                               {currentView === 'detail' && selectedProduct && (

                                            <h4 className="text-xs font-bold text-amber-950 flex items-center space-x-1">
                                                <span>✨ 大師客製化窯刻落款落詩題字服務 (免費附贈)</span>
                                            </h4>
                                            
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-[10px] text-neutral-500 mb-1">受贈對象或場合 (例: 開業大吉)</label>
                                                    <input type="text" value={inscriptionInput.target} 
                                                           onChange={e => setInscriptionInput({...inscriptionInput, target: e.target.value})}
                                                           placeholder="受贈名字 / 開業 / 新居"
                                                           className="w-full text-xs p-1.5 border bg-white focus:outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] text-neutral-500 mb-1">祝福文風風格</label>
                                                    <select value={inscriptionInput.style} 
                                                            onChange={e => setInscriptionInput({...inscriptionInput, style: e.target.value})}
                                                            className="w-full text-xs p-1.5 border bg-white focus:outline-none">
                                                        <option value="four-words">四字典雅吉祥</option>
                                                        <option value="poem">七言律詩絕句</option>
                                                        <option value="zen">易經哲理禪詩</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <button onClick={generateInscription} disabled={isGeneratingInscription}
                                                    className="w-full bg-[#78350f] text-white text-xs py-1.5 font-bold hover:bg-amber-900 transition-colors flex items-center justify-center space-x-1">
                                                {isGeneratingInscription ? "✨ 大師正在調配朱砂靈感..." : "✨ 呼請大師靈感生成專屬款識"}
                                            </button>

                                            {generatedInscription && (
                                                <div className="bg-white p-3 border border-amber-900/10 text-center space-y-2 mt-2">
                                                    <div className="text-amber-900 font-serif font-bold text-sm tracking-widest border-b pb-1">
                                                        {generatedInscription.inscription}
                                                    </div>
                                                    <p className="text-[10px] text-neutral-500 text-justify font-light leading-relaxed">
                                                        <strong>大師典故深釋：</strong> {generatedInscription.explanation}
                                                    </p>
                                                    <button onClick={() => { setAppliedInscription(generatedInscription.inscription); alert("已將此款識套用於此陶件！當您將此品加入購物車時將自動攜帶此款識進行燒刻落款。"); }}
                                                            className="bg-[#2C2A29] text-white text-[10px] px-3 py-1 hover:bg-neutral-800 transition-colors">
                                                        確定將此款識鐫刻於本作品底座
                                                    </button>
                                                </div>
                                            )}

                                            {appliedInscription && (
                                                <div className="text-[11px] text-emerald-800 bg-emerald-50 border border-emerald-200 p-2 text-center font-bold">
                                                    ✓ 已成功鎖定客製落款：【{appliedInscription}】
                                                </div>
                                            )}
                                        </div>

                                        <div className="pt-2 space-y-4">
                                            <div className="flex items-center space-x-3 font-sans">
                                                <span className="text-xs text-neutral-500">典藏數量：</span>
                                                <div className="flex items-center border border-neutral-300 bg-white">
                                                    <button onClick={() => setDetailQuantity(p => Math.max(1, p - 1))} className="px-3 py-1 text-xs font-bold hover:bg-neutral-100">-</button>
                                                    <span className="px-4 py-1 text-xs font-bold">{detailQuantity}</span>
                                                    <button onClick={() => setDetailQuantity(p => Math.min(selectedProduct.stock, p + 1))} className="px-3 py-1 text-xs font-bold hover:bg-neutral-100">+</button>
                                                </div>
                                            </div>

                                            <button onClick={() => addToCart(selectedProduct, detailQuantity)} className="w-full bg-[#2C2A29] text-[#FDFBF7] py-3 text-xs tracking-widest font-bold hover:bg-neutral-800 transition-colors">
                                                將 {detailQuantity} 件作品編入典藏清單
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {currentView === 'cart' && (
                            <section className="px-6 py-12 max-w-3xl mx-auto">
                                <h2 className="text-xl font-medium tracking-widest mb-6 border-b pb-3 text-[#2C2A29]">您的典藏清單 (購物車)</h2>
                                
                                {cart.length === 0 ? (
                                    <div className="text-center py-16 font-light text-xs text-neutral-400 tracking-widest">
                                        清單中暫無作品。 <br/>
                                        <button onClick={() => setCurrentView('home')} className="mt-4 border border-black px-4 py-1.5 text-black hover:bg-black hover:text-white">前往選購</button>
                                    </div>
                                ) : (
                                    <div className="space-y-5">
                                        {cart.map(item => (
                                            <div key={item.id} className="flex flex-col border-b pb-3 font-sans text-xs space-y-2">
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center space-x-3 cursor-pointer" onClick={() => navigateToDetail(item.id)}>
                                                        <img src={item.image} className="w-12 h-12 object-cover bg-neutral-100" />
                                                        <div>
                                                            <h4 className="font-serif font-medium text-neutral-800">{item.name}</h4>
                                                            <span className="text-[10px] text-neutral-400">{item.category}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center space-x-6">
                                                        <div className="flex items-center border border-neutral-300 bg-white">
                                                            <button onClick={() => updateCartQty(item.id, -1, item.stock)} className="px-2 py-0.5 text-xs hover:bg-neutral-100">-</button>
                                                            <span className="px-3 py-0.5 text-xs font-bold">{item.quantity}</span>
                                                            <button onClick={() => updateCartQty(item.id, 1, item.stock)} className="px-2 py-0.5 text-xs hover:bg-neutral-100">+</button>
                                                        </div>
                                                        <span className="font-bold text-amber-900 w-20 text-right font-sans">NT$ {(item.price * item.quantity).toLocaleString()}</span>
                                                        <button onClick={() => setCart(p => p.filter(i => i.id !== item.id))} className="text-neutral-400 hover:text-red-700">刪除</button>
                                                    </div>
                                                </div>
                                                {item.appliedInscription && (
                                                    <div className="bg-amber-50/50 border border-amber-900/10 px-3 py-1 text-[10px] text-amber-900 flex justify-between rounded-sm">
                                                        <span><strong>👑 獨客製題印落款：</strong> 【{item.appliedInscription}】</span>
                                                        <span className="text-neutral-400 font-light">大師將在出窯前手工款識鐫刻</span>
                                                    </div>
                                                )}
                                            </div>
                                        ))}

                                        <div className="bg-neutral-50 p-4 border border-neutral-200 flex flex-col sm:flex-row justify-between items-center gap-3">
                                            <div className="text-xs text-neutral-600">
                                                <strong>可用折扣代碼：</strong> {currentUser.coupons.length > 0 ? currentUser.coupons.join(', ') : '暫無優惠券'}
                                            </div>
                                            <div className="flex space-x-2 w-full sm:w-auto">
                                                <input type="text" id="couponInput" placeholder="輸入折扣代碼..." className="border px-3 py-1 text-xs bg-white focus:outline-none" />
                                                <button onClick={() => applyCouponCode(document.getElementById('couponInput').value.trim())} className="bg-[#2C2A29] text-white px-4 py-1 text-xs tracking-widest">套用</button>
                                            </div>
                                        </div>

                                        <div className="pt-4 flex flex-col items-end space-y-3">
                                            <div className="text-xs text-neutral-600 font-sans space-y-1 text-right">
                                                <div>原始金額： NT$ {cartTotal.toLocaleString()}</div>
                                                {activeCoupon && <div className="text-amber-800">優惠折抵： -NT$ {activeCoupon.discount.toLocaleString()} ({activeCoupon.code})</div>}
                                                <div className="border-t pt-1 font-bold text-sm text-amber-950">
                                                    折抵後應付金額： NT$ {Math.max(0, cartTotal - (activeCoupon ? activeCoupon.discount : 0)).toLocaleString()}
                                                </div>
                                            </div>
                                            <div className="flex space-x-3">
                                                <button onClick={() => setCurrentView('home')} className="border border-[#2C2A29] px-5 py-2 text-xs tracking-widest text-[#2C2A29] hover:bg-neutral-50">繼續瀏覽</button>
                                                <button onClick={() => setIsCheckoutOpen(true)} className="bg-[#2C2A29] text-white px-6 py-2 text-xs tracking-widest hover:bg-[#2C2A29] shadow-md font-bold">啟動安全配送結帳</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </section>
                        )}

                        {currentView === 'member' && (
                            <section className="px-6 py-12 max-w-3xl mx-auto space-y-8">
                                <div className="border border-neutral-200 bg-white p-6 space-y-6">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b pb-4">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-12 h-12 bg-[#2C2A29] text-[#FDFBF7] rounded-full flex items-center justify-center text-lg font-bold font-serif">
                                                {currentUser.username[0]}
                                            </div>
                                            <div>
                                                <h3 className="text-sm font-bold text-[#2C2A29]">{currentUser.username} <span className="text-xs font-light text-neutral-500">({currentUser.email})</span></h3>
                                                <span className="inline-block mt-1 text-[10px] tracking-widest bg-amber-900 text-white px-2 py-0.5 uppercase font-bold">
                                                    會籍狀態：{currentUser.level}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="text-right text-xs">
                                            <div className="text-neutral-500">累計消費金額</div>
                                            <div className="text-lg font-bold text-amber-950 font-sans">NT$ {currentUser.accSpent.toLocaleString()}</div>
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[11px] text-neutral-500 font-sans">
                                            <span>會籍進度 (新晉藏友 $\rightarrow$ 典藏雅士 3 萬 $\rightarrow$ 窯火尊榮 8 萬)</span>
                                            <span>累計 {currentUser.accSpent / 1000}k / 80k</span>
                                        </div>
                                        <div className="w-full bg-neutral-200 h-2 rounded-full overflow-hidden">
                                            <div className="bg-amber-800 h-full transition-all duration-500" style={{ width: `${Math.min(100, (currentUser.accSpent / 80000) * 100)}%` }}></div>
                                        </div>
                                    </div>

                                    <div className="grid sm:grid-cols-2 gap-4 pt-2">
                                        <div className="bg-neutral-50 p-4 border border-neutral-200 space-y-2">
                                            <span className="text-[11px] text-neutral-400 block uppercase font-bold">我的典藏積分</span>
                                            <div className="text-2xl font-bold text-amber-950 font-sans">{currentUser.points} <span className="text-xs text-neutral-500">點</span></div>
                                            <p className="text-[10px] text-neutral-400 leading-relaxed font-light">每消費 $100 累積 1 點。點數可用於未來兌換限定作品或不定期專屬折扣。</p>
                                        </div>
                                        <div className="bg-neutral-50 p-4 border border-neutral-200 space-y-2">
                                            <span className="text-[11px] text-neutral-400 block uppercase font-bold">我持有的專屬優惠券</span>
                                            <div className="space-y-1">
                                                {currentUser.coupons.length > 0 ? (
                                                    currentUser.coupons.map(coupon => (
                                                        <div key={coupon} className="flex justify-between items-center bg-white p-1.5 border text-[11px]">
                                                            <span className="font-bold font-sans text-amber-900">{coupon}</span>
                                                            <span className="text-neutral-400">{coupon === 'ZHUNAN500' ? '現折 $500' : '大額典藏現折 $2,000'}</span>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="text-xs text-neutral-400">目前無可用折價券</div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {currentView === 'orders' && (
                            <section className="px-6 py-12 max-w-3xl mx-auto space-y-6">
                                <h2 className="text-xl font-medium tracking-widest border-b pb-3 text-[#2C2A29]">您的歷史典藏訂單</h2>
                                {orders.length === 0 ? (
                                    <div className="text-center py-16 text-xs text-neutral-400 font-light tracking-widest">
                                        目前尚無歷史訂單紀錄。
                                    </div>
                                ) : (
                                    <div className="space-y-5">
                                        {orders.map(order => (
                                            <div key={order.orderId} className="border border-neutral-200 bg-white p-4 font-sans text-xs">
                                                <div className="flex justify-between border-b pb-2 mb-2 font-bold bg-neutral-50 p-2">
                                                    <span className="text-[#2C2A29]">訂單編號：{order.orderId}</span>
                                                    <span className="text-neutral-500">日期：{order.date}</span>
                                                </div>
                                                <div className="space-y-2 px-2">
                                                    {order.items.map(item => (
                                                        <div key={item.id} className="flex flex-col text-neutral-600 border-b pb-1">
                                                            <div className="flex justify-between">
                                                                <span>{item.name} × {item.quantity}</span>
                                                                <span>NT$ {(item.price * item.quantity).toLocaleString()}</span>
                                                            </div>
                                                            {item.appliedInscription && (
                                                                <div className="text-[10px] text-amber-900 bg-amber-50 px-2 py-0.5 mt-1 rounded-xs">
                                                                    底座落題： 【{item.appliedInscription}】
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="border-t mt-3 pt-2 px-2 text-right font-bold text-amber-950 text-sm">
                                                    支付總額：NT$ {order.total.toLocaleString()}
                                                </div>
                                                <div className="mt-2 px-2 text-[10px] text-neutral-400 border-l-2 border-neutral-300">
                                                    收件地址：{order.info.name} | {order.info.phone} | {order.info.address}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </section>
                        )}

                    </main>

                    {isCheckoutOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-xs">
                            <div className="bg-[#FDFBF7] p-6 max-w-md w-full border border-[#2C2A29]/20 shadow-2xl space-y-4">
                                <div className="flex justify-between items-center border-b pb-2">
                                    <h3 className="text-sm font-bold tracking-widest text-[#2C2A29]">國寶交趾陶・安全配送結帳</h3>
                                    <button onClick={() => setIsCheckoutOpen(false)} className="text-neutral-400 hover:text-black">✕</button>
                                </div>
                                <form onSubmit={handleCheckoutSubmit} className="space-y-3 text-xs font-sans">
                                    <div>
                                        <label className="block text-neutral-600 mb-1">藏品收件人姓名 *</label>
                                        <input type="text" required className="w-full border p-2 bg-white" placeholder="例：李典藏"
                                               value={checkoutForm.name} onChange={e => setCheckoutForm({...checkoutForm, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-neutral-600 mb-1">收件電話 *</label>
                                        <input type="tel" required className="w-full border p-2 bg-white" placeholder="例：0912-345-678"
                                               value={checkoutForm.phone} onChange={e => setCheckoutForm({...checkoutForm, phone: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-neutral-600 mb-1">安全配送地址 *</label>
                                        <input type="text" required className="w-full border p-2 bg-white" placeholder="請填寫作品寄送地址"
                                               value={checkoutForm.address} onChange={e => setCheckoutForm({...checkoutForm, address: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-neutral-600 mb-1">支付管道</label>
                                        <select className="w-full border p-2 bg-white" value={checkoutForm.payment} onChange={e => setCheckoutForm({...checkoutForm, payment: e.target.value})}>
                                            <option value="credit">3D 虛擬安全信用卡刷卡支付</option>
                                            <option value="atm">實名銀行虛擬轉帳</option>
                                        </select>
                                    </div>
                                    
                                    <div className="bg-amber-50 p-3 text-[11px] text-amber-900 border border-amber-200 font-sans leading-normal">
                                        <div>原始金額： NT$ {cartTotal.toLocaleString()}</div>
                                        {activeCoupon && <div className="text-amber-800">套用折抵： -NT$ {activeCoupon.discount.toLocaleString()} ({activeCoupon.code})</div>}
                                        <div className="border-t mt-1 pt-1 font-bold">實付總額： NT$ {Math.max(0, cartTotal - (activeCoupon ? activeCoupon.discount : 0)).toLocaleString()}</div>
                                    </div>

                                    <div className="flex space-x-2 pt-2">
                                        <button type="button" onClick={() => setIsCheckoutOpen(false)} className="flex-1 border p-2 text-center text-neutral-600 hover:bg-neutral-100">取消</button>
                                        <button type="submit" className="flex-1 bg-[#2C2A29] text-white p-2 text-center hover:bg-neutral-800">確認典藏</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-6 right-6 z-50">
                        <button onClick={() => setIsChatOpen(!isChatOpen)}
                            className="bg-[#2C2A29] text-[#FDFBF7] p-3.5 rounded-full shadow-xl hover:bg-neutral-800 transition-all flex items-center space-x-2 tracking-widest text-xs font-medium">
                            <span className="text-xl">💬</span>
                            <span>✨ AI 藝術策展人諮詢</span>
                        </button>

                        {isChatOpen && (
                            <div className="absolute bottom-14 right-0 w-[330px] md:w-[400px] h-[500px] bg-white border border-neutral-300 shadow-2xl flex flex-col z-50">
                                <div className="bg-[#2C2A29] text-[#FDFBF7] p-4 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-xs tracking-widest font-bold">駐廊藝術策展人 AI</h3>
                                        <span className="text-[9px] text-neutral-400 font-sans">✨ Gemini 2.5 智慧多維語意系統 v4.0</span>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)} className="text-neutral-400 hover:text-white text-xs">✕</button>
                                </div>

                                <div className="flex-grow p-4 overflow-y-auto space-y-3 text-xs leading-relaxed no-scrollbar bg-[#FDFBF7]">
                                    {chatMessages.map((msg, idx) => (
                                        <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-3 ${msg.sender === 'user' ? 'bg-[#2C2A29] text-white' : 'bg-[#F4EFE8] border border-neutral-200 text-neutral-800 shadow-xs'}`}>
                                                <p className="font-light text-justify leading-relaxed">{msg.text}</p>
                                                {msg.linkProduct && (
                                                    <div className="mt-3 pt-2 border-t border-dashed border-neutral-300 flex items-center space-x-2 bg-white/90 p-2 cursor-pointer hover:bg-white"
                                                         onClick={() => { navigateToDetail(msg.linkProduct.id); setIsChatOpen(false); }}>
                                                        <img src={msg.linkProduct.image} className="w-10 h-10 object-cover" />
                                                        <div className="flex-grow overflow-hidden font-sans">
                                                            <div className="font-serif font-bold text-[10px] text-amber-900 truncate">{msg.linkProduct.name}</div>
                                                            <div className="text-[9px] text-neutral-500 font-bold">NT$ {msg.linkProduct.price.toLocaleString()} (點擊即時導購)</div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {isChatLoading && (
                                        <div className="flex justify-start">
                                            <div className="max-w-[85%] p-3 bg-neutral-100 border text-neutral-500 italic animate-pulse">
                                                ✨ 策展人正在翻閱典藏卷軸...
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="px-2 py-1.5 bg-neutral-100 flex gap-1.5 overflow-x-auto text-[10px] whitespace-nowrap no-scrollbar border-t border-b">
                                    <button type="button" onClick={() => { setUserInput("我想找辟邪效果好、放玄關的推薦作品"); }} className="bg-white border rounded px-2 py-0.5 hover:border-black">玄關辟邪推薦</button>
                                    <button type="button" onClick={() => { setUserInput("如何保養與清潔交趾陶？"); }} className="bg-white border rounded px-2 py-0.5 hover:border-black">清潔與保養</button>
                                    <button type="button" onClick={() => { setUserInput("如何註冊會員？有什麼優惠折扣？"); }} className="bg-white border rounded px-2 py-0.5 hover:border-black">會籍折扣與積點</button>
                                </div>

                                <form onSubmit={handleSendMessage} className="p-2 flex bg-white border-t">
                                    <input type="text" value={userInput} onChange={(e) => setUserInput(e.target.value)}
                                        placeholder="對策展人說：我想挑選一件新婚入厝禮..."
                                        className="flex-grow px-3 py-1.5 text-xs border border-neutral-300 focus:outline-none focus:border-black font-sans" />
                                    <button type="submit" className="bg-[#2C2A29] text-white px-4 text-xs tracking-widest font-bold">諮詢</button>
                                </form>
                            </div>
                        )}
                    </div>

                    <footer className="bg-[#2C2A29] text-[#FDFBF7]/40 text-center py-6 text-[10px] tracking-widest mt-auto border-t border-neutral-800">
                        © 2026 竹南交趾陶數位典藏藝廊. 會員與智慧 AI 語意完整實戰版.
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
